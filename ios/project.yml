name: Memorizer
options:
  bundleIdPrefix: com.joshwafr
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  Memorizer:
    type: application
    platform: iOS
    sources: [Memorizer]
    dependencies:
      - target: ShareExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joshwafr.memorizer
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Memorizer
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        SWIFT_VERSION: "5.9"

  ShareExtension:
    type: app-extension
    platform: iOS
    sources: [ShareExtension]
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Memorizer
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
              NSExtensionActivationSupportsText: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joshwafr.memorizer.share
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        SWIFT_VERSION: "5.9"
