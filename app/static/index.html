<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Memorizer</title>
<style>
  :root { --accent: #4f6df5; --ok: #2e9e5b; --bad: #c0392b; --muted: #777; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         max-width: 720px; margin: 0 auto; padding: 1em; background: #fafafa; color: #222; }
  h1 { font-size: 1.4em; }
  section { background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
            padding: 1em; margin-bottom: 1em; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  h2 { margin-top: 0; font-size: 1.1em; }
  .muted { color: var(--muted); font-size: 0.88em; }
  .error { color: var(--bad); }
  textarea, input[type=url] { width: 100%; padding: 0.6em; border: 1px solid #ccc;
            border-radius: 6px; font: inherit; }
  button { font: inherit; padding: 0.45em 1em; border-radius: 6px; border: 1px solid #ccc;
           background: #fff; cursor: pointer; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.approve { background: var(--ok); border-color: var(--ok); color: #fff; }
  button.reject { background: #fff; border-color: var(--bad); color: var(--bad); }
  .capture-row { display: flex; gap: 0.5em; }
  .capture-row input { flex: 1; }

  /* progress bar */
  #progress-wrap { display: none; margin-top: 0.8em; }
  #progress-track { background: #eee; border-radius: 6px; height: 14px; overflow: hidden; }
  #progress-fill { background: var(--accent); height: 100%; width: 0;
                   transition: width 0.6s ease; }
  #progress-label { margin-top: 0.3em; }

  /* inbox */
  .import { border: 1px solid #e3e3e3; border-radius: 8px; margin: 0.6em 0; overflow: hidden; }
  .import-head { display: flex; align-items: center; gap: 0.6em; padding: 0.7em 0.8em;
                 cursor: pointer; background: #fff; }
  .import-head:hover { background: #f4f6ff; }
  .import-icon { font-size: 1.3em; }
  .import-title { font-weight: 600; flex: 1; }
  .import-body { display: none; padding: 0 0.8em 0.8em; border-top: 1px solid #eee; }
  .import.open .import-body { display: block; }
  .card { background: #f6f7fb; border-radius: 6px; padding: 0.6em; margin: 0.5em 0; }
  .badge { background: #eef; color: var(--accent); border-radius: 10px;
           padding: 0.1em 0.6em; font-size: 0.8em; white-space: nowrap; }
  .actions { margin-top: 0.6em; display: flex; gap: 0.5em; }

  .grade { font-weight: 700; text-transform: capitalize; }
  .grade.good, .grade.easy { color: var(--ok); }
  .grade.hard { color: #b8860b; }
  .grade.again { color: var(--bad); }
</style>
</head>
<body>
<h1>🧠 Memorizer</h1>

<section id="capture-section">
  <h2>Capture</h2>
  <form id="capture-form" class="capture-row">
    <input type="url" id="capture-url" placeholder="Paste a YouTube or article link…" required>
    <button type="submit" class="primary">Capture</button>
  </form>
  <div id="progress-wrap">
    <div id="progress-track"><div id="progress-fill"></div></div>
    <p id="progress-label" class="muted"></p>
  </div>
  <p id="capture-status" class="muted"></p>
</section>

<section id="inbox-section">
  <h2>📥 Inbox <span id="inbox-count" class="muted"></span>
      <button id="inbox-refresh" style="float:right">Refresh</button></h2>
  <div id="inbox-list"></div>
</section>

<section id="review-section">
  <h2>🎯 Review <span id="due-count" class="muted"></span>
      <button id="review-refresh" style="float:right">Refresh</button></h2>
  <div id="review-area"></div>
</section>

<script>
async function api(path, opts = {}) {
  return fetch(path, opts);
}

async function readBody(r) {
  const text = await r.text();
  try { return JSON.parse(text); } catch { return { detail: text || r.statusText }; }
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s == null ? "" : String(s);
  return d.innerHTML;
}

// --- Capture with live progress ---
const STAGE_LABELS = {
  pending: "Fetching the content…",
  fetched: "Reading it and distilling insights…",
};
let pollTimer = null, shownProgress = 0;

document.getElementById("capture-form").onsubmit = async (e) => {
  e.preventDefault();
  const status = document.getElementById("capture-status");
  status.textContent = "";
  try {
    const r = await api("/capture", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url: document.getElementById("capture-url").value }),
    });
    const body = await readBody(r);
    if (!r.ok) { status.textContent = "Error: " + JSON.stringify(body); return; }
    document.getElementById("capture-url").value = "";
    startProgress(body.id);
  } catch (err) {
    status.textContent = "Error: " + (err.message || err);
  }
};

function setProgress(pct, label) {
  document.getElementById("progress-wrap").style.display = "block";
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-label").textContent = `${pct}% — ${label}`;
}

function startProgress(sourceId) {
  clearInterval(pollTimer);
  shownProgress = 5;
  setProgress(5, "Starting…");
  pollTimer = setInterval(async () => {
    let s;
    try { s = await readBody(await api(`/sources/${sourceId}`)); }
    catch { return; }  // transient network hiccup — keep polling
    if (s.progress < 100) {
      // creep toward the next stage so the bar always feels alive
      shownProgress = Math.min(Math.max(s.progress, shownProgress + 2), 95);
      setProgress(shownProgress, STAGE_LABELS[s.status] || "Working…");
      return;
    }
    clearInterval(pollTimer);
    setProgress(100, "Done");
    const status = document.getElementById("capture-status");
    if (s.status === "inbox") {
      status.innerHTML = `✅ <b>${esc(s.title || "Captured")}</b> — ${s.card_count} cards waiting in your inbox.`;
    } else if (s.status === "discarded") {
      status.innerHTML = `🗑 Filtered out as not relevant: <span class="muted">${esc(s.triage_reason || "")}</span>`;
    } else if (s.status === "failed") {
      status.innerHTML = `<span class="error">❌ Failed to process — hit Capture again to retry.</span>`;
    } else {
      status.textContent = `Finished with status: ${s.status}`;
    }
    setTimeout(() => { document.getElementById("progress-wrap").style.display = "none"; }, 1500);
    loadInbox();
  }, 1500);
}

// --- Inbox: one collapsible item per imported video/article ---
async function loadInbox() {
  const list = document.getElementById("inbox-list");
  const r = await api("/inbox");
  if (!r.ok) { list.innerHTML = '<p class="error">Failed to load inbox.</p>'; return; }
  const sources = await r.json();
  document.getElementById("inbox-count").textContent = sources.length ? `(${sources.length})` : "";
  if (!sources.length) { list.innerHTML = '<p class="muted">Inbox empty — capture something above.</p>'; return; }
  list.innerHTML = sources.map((s, i) => `
    <div class="import ${i === 0 ? "open" : ""}" data-id="${s.id}">
      <div class="import-head">
        <span class="import-icon">${s.source_type === "youtube" ? "▶️" : "📰"}</span>
        <span class="import-title">${esc(s.title || s.url)}</span>
        <span class="badge">${s.cards.length} cards</span>
      </div>
      <div class="import-body">
        <p class="muted">${esc(s.triage_reason || "")}</p>
        ${s.cards.map(c => `<div class="card"><b>Q:</b> ${esc(c.question)}<br><br><b>A:</b> ${esc(c.answer)}</div>`).join("")}
        <div class="actions">
          <button data-action="approve" class="approve">Approve — start learning</button>
          <button data-action="reject" class="reject">Reject</button>
        </div>
      </div>
    </div>`).join("");
}

document.getElementById("inbox-list").onclick = async (e) => {
  const action = e.target.dataset.action;
  if (action) {
    const id = e.target.closest(".import").dataset.id;
    e.target.disabled = true;
    await api(`/sources/${id}/${action}`, { method: "POST" });
    await loadInbox();   // next import auto-opens, so you work through one at a time
    loadReview();
    return;
  }
  const head = e.target.closest(".import-head");
  if (head) head.parentElement.classList.toggle("open");
};
document.getElementById("inbox-refresh").onclick = loadInbox;

// --- Review loop ---
let queue = [], idx = 0;

async function loadReview() {
  const r = await api("/review/due");
  if (!r.ok) {
    document.getElementById("review-area").innerHTML = '<p class="error">Failed to load due cards.</p>';
    return;
  }
  queue = await r.json();
  idx = 0;
  showQuestion();
}

function showQuestion() {
  const area = document.getElementById("review-area");
  document.getElementById("due-count").textContent = `(${queue.length - idx} due)`;
  if (idx >= queue.length) { area.innerHTML = '<p class="muted">No cards due. 🎉</p>'; return; }
  const card = queue[idx];
  area.innerHTML = `
    <p class="muted">${esc(card.source_title || "")}</p>
    <p><b>${esc(card.question)}</b></p>
    <textarea id="answer-input" rows="4" placeholder="Type your answer"></textarea><br><br>
    <button id="answer-submit" class="primary">Submit</button>`;
  document.getElementById("answer-submit").onclick = () => submitAnswer(card.id);
}

async function submitAnswer(cardId) {
  const area = document.getElementById("review-area");
  const answer = document.getElementById("answer-input").value;
  const btn = document.getElementById("answer-submit");
  btn.disabled = true;
  btn.textContent = "Grading…";
  try {
    const r = await api(`/review/${cardId}/answer`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ answer }),
    });
    const body = await readBody(r);
    if (!r.ok) {
      area.innerHTML += `<p class="error">Error: ${esc(JSON.stringify(body))}</p>`;
      return;
    }
    area.innerHTML = `
      <p class="grade ${esc(body.grade)}">${esc(body.grade)}</p>
      <p>${esc(body.feedback)}</p>
      <p class="muted"><b>Full answer:</b> ${esc(body.correct_answer)}</p>
      <button id="next-btn" class="primary">Next</button>`;
    document.getElementById("next-btn").onclick = () => { idx++; showQuestion(); };
  } catch (err) {
    area.innerHTML += `<p class="error">Error: ${esc(err.message || err)}</p>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "Submit";
  }
}
document.getElementById("review-refresh").onclick = loadReview;

loadInbox();
loadReview();
</script>
</body>
</html>
